        } else {
            state.notes.push({ id: uuid(), ...data, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
            toast('Nota creada');
        }
        await persistState();
        closeModal();
        renderView();
    }

    function deleteNote(id) {
        const n = state.notes.find(x => x.id === id);
        showConfirm(`¿Eliminar la nota "${n?.title}"?`, async () => {
            state.notes = state.notes.filter(x => x.id !== id);
            await persistState();
            toast('Nota eliminada', 'info');
            renderView();
        });
    }

    // ============================================================
    //  CONFIGURACIÓN
    // ============================================================
    function renderSettings() {
        const dataSize = new Blob([JSON.stringify({ contacts: state.contacts, deals: state.deals, tasks: state.tasks, notes: state.notes })]).size;
        const sizeStr = dataSize > 1024 ? (dataSize / 1024).toFixed(1) + ' KB' : dataSize + ' B';

        return `
        <div style="margin-bottom:28px;">
            <h1 style="font-family:'Space Grotesk';font-size:28px;font-weight:700;letter-spacing:-0.02em;">Configuración</h1>
            <p style="color:#64748b;font-size:15px;margin-top:4px;">Gestiona tus datos y preferencias</p>
        </div>

        <div style="display:grid;gap:20px;max-width:600px;">
            <!-- Info del sistema -->
            <div class="stat-card animate-in">
                <h3 style="font-family:'Space Grotesk';font-size:16px;font-weight:700;margin-bottom:16px;">Información del Sistema</h3>
                <div style="display:grid;gap:12px;">
                    <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f1f5f9;">
                        <span style="font-size:14px;color:#64748b;">Modo de almacenamiento</span>
                        <span class="badge" style="background:${state.isLocal ? '#fef3c7' : '#d1fae5'};color:${state.isLocal ? '#d97706' : '#059669'};">${state.isLocal ? 'Local (localStorage)' : 'Netlify Blobs'}</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f1f5f9;">
                        <span style="font-size:14px;color:#64748b;">Contactos</span>
                        <span style="font-size:14px;font-weight:600;">${state.contacts.length}</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f1f5f9;">
                        <span style="font-size:14px;color:#64748b;">Negocios</span>
                        <span style="font-size:14px;font-weight:600;">${state.deals.length}</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f1f5f9;">
                        <span style="font-size:14px;color:#64748b;">Tareas</span>
                        <span style="font-size:14px;font-weight:600;">${state.tasks.length}</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f1f5f9;">
                        <span style="font-size:14px;color:#64748b;">Notas</span>
                        <span style="font-size:14px;font-weight:600;">${state.notes.length}</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;padding:10px 0;">
                        <span style="font-size:14px;color:#64748b;">Tamaño de datos</span>
                        <span style="font-size:14px;font-weight:600;">${sizeStr}</span>
                    </div>
                </div>
            </div>

            <!-- Exportar / Importar -->
            <div class="stat-card animate-in animate-in-delay-1">
                <h3 style="font-family:'Space Grotesk';font-size:16px;font-weight:700;margin-bottom:16px;">Exportar / Importar Datos</h3>
                <div style="display:grid;gap:12px;">
                    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#f8fafc;border-radius:12px;">
                        <div>
                            <div style="font-size:14px;font-weight:600;">Exportar datos</div>
                            <div style="font-size:12px;color:#94a3b8;">Descarga un archivo JSON con todos tus datos</div>
                        </div>
                        <button class="btn btn-secondary btn-sm" onclick="exportData()"><i class="fas fa-download"></i> Exportar</button>
                    </div>
                    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#f8fafc;border-radius:12px;">
                        <div>
                            <div style="font-size:14px;font-weight:600;">Importar datos</div>
                            <div style="font-size:12px;color:#94a3b8;">Carga un archivo JSON previamente exportado</div>
                        </div>
                        <label class="btn btn-secondary btn-sm" style="cursor:pointer;">
                            <i class="fas fa-upload"></i> Importar
                            <input type="file" accept=".json" style="display:none;" onchange="importData(event)">
                        </label>
                    </div>
                </div>
            </div>

            <!-- Zona peligrosa -->
            <div class="stat-card animate-in animate-in-delay-2" style="border:1px solid #fee2e2;">
                <h3 style="font-family:'Space Grotesk';font-size:16px;font-weight:700;color:#dc2626;margin-bottom:16px;">Zona Peligrosa</h3>
                <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fef2f2;border-radius:12px;">
                    <div>
                        <div style="font-size:14px;font-weight:600;color:#991b1b;">Borrar todos los datos</div>
                        <div style="font-size:12px;color:#dc2626;">Elimina permanentemente todos los contactos, negocios, tareas y notas</div>
                    </div>
                    <button class="btn btn-danger btn-sm" onclick="clearAllData()"><i class="fas fa-trash-alt"></i> Borrar Todo</button>
                </div>
            </div>
        </div>`;
    }

    function exportData() {
        const data = { contacts: state.contacts, deals: state.deals, tasks: state.tasks, notes: state.notes, exportDate: new Date().toISOString(), version: '1.0' };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `crm-backup-${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        toast('Datos exportados correctamente');
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (data.contacts && data.deals && data.tasks && data.notes) {
                    state.contacts = data.contacts;
                    state.deals = data.deals;
                    state.tasks = data.tasks;
                    state.notes = data.notes;
                    await persistState();
                    toast('Datos importados correctamente');
                    renderView();
                } else {
                    toast('Archivo inválido: faltan campos requeridos', 'error');
                }
            } catch (err) {
                toast('Error al leer el archivo JSON', 'error');
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    function clearAllData() {
        showConfirm('¿Borrar TODOS los datos?', async () => {
            state.contacts = [];
            state.deals = [];
            state.tasks = [];
            state.notes = [];
            await persistState();
            toast('Todos los datos han sido eliminados', 'warning');
            renderView();
        });
    }

    // ============================================================
    //  RESPONSIVE: mostrar/ocultar botón hamburguesa
    // ============================================================
    function handleResize() {
        const menuBtn = document.getElementById('menuBtn');
        if (window.innerWidth <= 768) {
            menuBtn.style.display = 'flex';
        } else {
            menuBtn.style.display = 'none';
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('show');
        }
    }
    window.addEventListener('resize', handleResize);

    // ============================================================
    //  INICIALIZACIÓN
    // ============================================================
    async function init() {
        handleResize();
        try {
            const data = await API.load();
            state.contacts = data.contacts || [];
            state.deals = data.deals || [];
            state.tasks = data.tasks || [];
            state.notes = data.notes || [];
        } catch (err) {
            console.error('Error cargando datos:', err);
            toast('Error al cargar los datos', 'error');
        }
        renderView();
    }

    // Atajos de teclado
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal();
        // Ctrl+K para buscar
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            document.getElementById('globalSearch').focus();
        }
    });

    // Arrancar la app
    init();
    </script>
</body>
</html>
